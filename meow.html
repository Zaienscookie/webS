<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恭喜通关</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #050505;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        /* 猫猫呼吸动画 */
        .cat-icon {
            font-size: 80px;
            color: #ffb966;
            filter: drop-shadow(0 0 15px rgba(255, 185, 102, 0.4));
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 25px rgba(255, 185, 102, 0.6)); }
        }

        /* 文字渐现动画 */
        .fade-in {
            opacity: 0;
            animation: fadeIn 2s forwards;
            animation-delay: 0.5s;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(-10px); }
        }

        .divider {
            width: 40px;
            height: 2px;
            background: #333;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="cat-icon">
        <i class="fas fa-cat"></i>
    </div>

    <div class="text-center fade-in" style="transform: translateY(0);">
        <h1 class="text-2xl font-light tracking-widest mb-2">考验通过</h1>
        <p class="text-gray-500 text-sm tracking-tight">恭喜你，成功的挑战者</p>
        
        <div class="flex justify-center">
            <div class="divider"></div>
        </div>

        <button onclick="window.location.href='index.html'" class="text-xs text-orange-200/50 hover:text-orange-200 transition">
            <i class="fas fa-arrow-left mr-1"></i> 返回主页
        </button>
    </div>

</body>
</html>
